    &lt;style&gt;
        :root {
            --primary: #00467f; --secondary: #f4f4f4; --accent: #ffcc00; --text: #333; --success: #28a745; --error: #dc3545;
        }
        body { font-family: Arial, sans-serif; margin: 0; background-color: var(--secondary); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; flex-shrink: 0; }
        
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; padding: 0 20px; overflow-x: auto; flex-shrink: 0; }
        .tab { padding: 12px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; white-space: nowrap; color: #666; font-size: 0.85rem; }
        .tab.active { border-bottom-color: var(--primary); color: var(--primary); }

        .main-container { display: flex; flex: 1; overflow: hidden; background: white; }
        .passage-section { flex: 1; padding: 25px 35px; overflow-y: auto; border-right: 1px solid #ddd; line-height: 1.7; font-size: 1.05rem; }
        .passage-section h2 { color: var(--primary); margin-top: 0; font-size: 1.4rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question-section { width: 460px; background: #fcfcfc; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .question-box { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: none; }
        .question-box.active { display: block; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .option { padding: 14px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: flex-start; gap: 10px; font-size: 0.95rem; }
        .option:hover { background: #f0f7ff; border-color: var(--primary); }
        .option.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .option.wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }
        .opt-label { font-weight: bold; min-width: 25px; }

        .feedback { margin-top: 15px; padding: 12px; border-radius: 6px; background: #f8f9fa; font-weight: bold; display: none; border-left: 4px solid #ddd; font-size: 0.9rem; }
        .feedback.show { display: block; }

        footer { background: #fff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; flex-shrink: 0; }
        button { padding: 8px 25px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #login-overlay, #result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; padding: 40px; border-radius: 12px; width: 450px; text-align: center; }
        #result-overlay { background: rgba(255,255,255,0.98); display: none; flex-direction: column; z-index: 2000; text-align: center; }
        .score-num { font-size: 4rem; color: var(--primary); font-weight: bold; margin: 10px 0; }
    &lt;/style&gt;

    &lt;script&gt;
        const passages = [
            {
                title: &quot;Thai Elephant Orchestra&quot;,
                text: &quot;In the town of Lampang in northern Thailand, there is an unusual group of musicians. They play many different kinds of music-everything from traditional Thai songs to music by Beethoven. Both children and adults love this group. What makes them so popular? Is it their music? Their looks? Yes, it's both, but it's also something else: they're elephants.&lt;br&gt;&lt;br&gt;These musical elephants started at the Thai Elephant Conservation Center (TECC) in Lampang. The TECC protects elephants. It teaches people to understand and care for these huge, but gentle, animals. And, like many zoos around the world, the TECC encourages elephants to paint.&lt;br&gt;&lt;br&gt;Richard Lair works with the TECC. He knows a lot about elephants. He says some of the animals' paintings are very good. But, in fact, elephants hear better than they see. And so he had an idea: if elephants are intelligent and they have good hearing, maybe they can play music. To test his idea, Lair and a friend started the Thai Elephant Orchestra. During a performance, the elephants play a variety of instruments, including the drums and the xylophone. The animals also use their voices and trunks to make sounds.&lt;br&gt;&lt;br&gt;But can elephants really make music properly? Yes, says Lair. They're very creative. Humans encourage the animals to play, but the elephants make their own songs; they don't just copy their trainers or other people. There are now CDs of the group's music, which earn money for the TECC. And the music these artists create is pretty amazing.&quot;,
                questions: [
                    { q: &quot;Which could be the title for this article?&quot;, options: [&quot;Teaching Elephants to Paint&quot;, &quot;Elephants in Danger&quot;, &quot;TECC Trainers&quot;, &quot;An Unusual Orchestra&quot;], correct: 3 },
                    { q: &quot;The elephants at the TECC&quot;, options: [&quot;see better than they hear&quot;, &quot;are able to paint&quot;, &quot;copy humans to play music&quot;, &quot;make their own instruments&quot;], correct: 1 },
                    { q: &quot;Why did Richard Lair start the Thai Elephant Orchestra?&quot;, options: [&quot;He had heard the elephants playing music.&quot;, &quot;He needed to make money for the TECC.&quot;, &quot;He believed elephants could play music.&quot;, &quot;He wanted to be on TV in Thailand.&quot;], correct: 2 },
                    { q: &quot;In the third paragraph, what does \&quot;a variety of\&quot; mean?&quot;, options: [&quot;The same kind of&quot;, &quot;Many different&quot;, &quot;Two types of&quot;, &quot;Too many&quot;], correct: 1 },
                    { q: &quot;Read the last sentence in the passage again. What does it mean?&quot;, options: [&quot;The elephants play great music.&quot;, &quot;Human artists now play with the elephants.&quot;, &quot;The elephants are very beautiful.&quot;, &quot;Human musicians want to copy the elephants' songs.&quot;], correct: 0 }
                ]
            },
            {
                title: &quot;Golf Courses&quot;,
                text: &quot;Golf courses have different sizes and shapes. Most of them have 18 holes that are between a hundred and 500 metres long. If you have finished playing all 18 holes you have played a round of golf. Each hole has a starting place, called a tee. This is a small area from which the golfer takes the first stroke or drive. The grass between the tee and the green is called the fairway. Sometimes fairways can be very long and golf players need a few strokes to get to the green. The land on the left and right of the fairway is the rough. It is made up of tall grass, bushes and trees.&lt;br&gt;&lt;br&gt;The green is the round area at the end of the fairway. It has special grass that is very short. In the middle of the green is a hole. It has a flag placed in it so that golfers can see where it is.&lt;br&gt;&lt;br&gt;Almost all golf courses have hazards. These are small lakes, sandy areas and bunkers. They make it more difficult for players to hit the ball.&quot;,
                questions: [
                    { q: &quot;In the first paragraph, the word \&quot;round\&quot; is closest in meaning to&quot;, options: [&quot;ball&quot;, &quot;circle&quot;, &quot;game&quot;, &quot;shift&quot;], correct: 2 },
                    { q: &quot;According to the passage, where do the golfers begin their game?&quot;, options: [&quot;The green&quot;, &quot;The tee&quot;, &quot;The fairway&quot;, &quot;The rough&quot;], correct: 1 },
                    { q: &quot;What can we infer about the \&quot;hole\&quot;?&quot;, options: [&quot;It's very clear to see.&quot;, &quot;It's hard for players to stroke the ball into it.&quot;, &quot;It's made of special grass.&quot;, &quot;It's located in the center of the green.&quot;], correct: 3 },
                    { q: &quot;In the third paragraph, the word \&quot;hazards\&quot; is closest in meaning to&quot;, options: [&quot;golfers&quot;, &quot;bushes&quot;, &quot;obstacles&quot;, &quot;bunkers&quot;], correct: 2 },
                    { q: &quot;In the third paragraph, the word \&quot;they\&quot; refers to&quot;, options: [&quot;the golfers&quot;, &quot;grass, bushes and trees&quot;, &quot;the fairway, the rough and the hazards&quot;, &quot;the small lakes, sandy areas and bunkers&quot;], correct: 3 }
                ]
            },
            {
                title: &quot;Canadian English&quot;,
                text: &quot;The roots of Canadian English can be found in the events which followed the American Revolution of 1776. Those who had supported Britain found themselves unable to stay in the new United States, and most went into exile in the Ontario region of Canada. From there they spread to all parts of the country. They were soon followed by many thousands who were attracted by the cheapness of land. Within fifty years, the population of Upper Canada (above Montreal) had reached 100,000--mainly people from the United States.&lt;br&gt;&lt;br&gt;In the east, the Atlantic Provinces had been settled with English speakers much earlier (the first contacts were as early as 1497, when the British explorer John Cabot claimed Newfoundland), but even today these areas contain less than 10 percent of the population, so that they have only a marginal role in the development of the Canadian \&quot;norm\&quot;. In Quebec, the use of French language and culture remains from the first period of exploration, with the majority of people using French as a mother-tongue: here, English and French coexist uneasily.&lt;br&gt;&lt;br&gt;Because of its origins, Canadian English has a great deal in common with the rest of the English spoken in North America, and is often difficult to distinguish for people who live outside the region. To British people, Canadians may sound American; to Americans, they may sound British. Canadians themselves insist on not being identified with either, and certainly there is a great deal of evidence in support of this view.&quot;,
                questions: [
                    { q: &quot;Which is the best title for this passage?&quot;, options: [&quot;Main Provinces in Canada&quot;, &quot;The Settlement of English in Canada&quot;, &quot;The Origins of Canadian English&quot;, &quot;The Different English Branches&quot;], correct: 2 },
                    { q: &quot;Why did the Britain's supporters go to Canada at the very beginning?&quot;, options: [&quot;Because it was cooler in Canada in summer&quot;, &quot;Because they were defeated and forced to leave for Canada&quot;, &quot;Because they were attracted by the cheapness of land in Canada&quot;, &quot;Because they all hated the new United States&quot;], correct: 1 },
                    { q: &quot;In the second paragraph, the word \&quot;marginal\&quot; is closest in meaning to&quot;, options: [&quot;special&quot;, &quot;optional&quot;, &quot;international&quot;, &quot;dispensable&quot;], correct: 3 },
                    { q: &quot;What can we infer from the second paragraph?&quot;, options: [&quot;People who speak English may find it a little difficult to live in Quebec.&quot;, &quot;English and French can't coexist in Quebec.&quot;, &quot;English settled in Quebec earlier than French.&quot;, &quot;People in Quebec hated using English as their mother-tongue.&quot;], correct: 0 },
                    { q: &quot;In the last paragraph, the phrase \&quot;in common\&quot; is closest in meaning to&quot;, options: [&quot;different&quot;, &quot;similar&quot;, &quot;variety&quot;, &quot;ordinary&quot;], correct: 1 },
                    { q: &quot;In the last line of the passage, the word \&quot;this\&quot; refers to&quot;, options: [&quot;Canadian English&quot;, &quot;Canadian English sounds British&quot;, &quot;Canadian English sounds like either British English or American English&quot;, &quot;Canadian English has much in common with the rest of the English spoken in North America&quot;], correct: 2 },
                    { q: &quot;According to the passage, all of the following have contributed to the origins of Canadian English EXCEPT&quot;, options: [&quot;American Revolution of 1776&quot;, &quot;Newfoundland founded by British explorer John Cabot&quot;, &quot;the interactions between English and French&quot;, &quot;people's discussions about British English and American English&quot;], correct: 3 }
                ]
            },
            {
                title: &quot;New World Settlers&quot;,
                text: &quot;When the first settlers came to the New World in the 17th century they were on their own. They had to choose their own leaders and solve the problems that they faced. Great Britain was not really interested in the colonists and, in addition, faced problems at home too.&lt;br&gt;&lt;br&gt;In the middle of the 18th century Britain defeated France in a war that spread to the New World. Britain's victory allowed it to control over most of the territories in North America. They ruled the New World from the Atlantic Ocean to the Mississippi River. However fighting against France cost a lot of money and the British government decided that the colonies in America should also pay for this war.&lt;br&gt;&lt;br&gt;Colonists were angry at the British rulers, not only because they wanted more money from them, but also because they forbade them to settle in areas west of the Appalachian Mountains. These regions were reserved for the Indians, whom the British did not want to make angry.&quot;,
                questions: [
                    { q: &quot;Which sentence best summarizes the main idea of the passage?&quot;, options: [&quot;The peace of the colonists was disturbed by the British rulers.&quot;, &quot;What kind of life were the people in colonies leading?&quot;, &quot;How did the British rulers win the colonies?&quot;, &quot;The war between the first settlers and the new British rulers broke out.&quot;], correct: 0 },
                    { q: &quot;In the first paragraph, the phrase \&quot;on their own\&quot; is closest in meaning to&quot;, options: [&quot;by themselves&quot;, &quot;accompanied&quot;, &quot;dependable&quot;, &quot;lonely&quot;], correct: 0 },
                    { q: &quot;What happened to the colonies when Britain defeated France in a war?&quot;, options: [&quot;Britain won a big sum of money from France.&quot;, &quot;Britain got control over most of the territories in North America.&quot;, &quot;The colonies got a great deal of benefit from the victory of Britain.&quot;, &quot;Most French were expelled out of the North America after the victory of Britain.&quot;], correct: 1 },
                    { q: &quot;In the last paragraph, the word \&quot;forbade\&quot; is closest in meaning to&quot;, options: [&quot;encouraged&quot;, &quot;objected&quot;, &quot;prohibited&quot;, &quot;sponsored&quot;], correct: 2 },
                    { q: &quot;All of the following are the reasons why the colonies were angry with the British rulers EXCEPT that&quot;, options: [&quot;British rulers wanted more money from them&quot;, &quot;they were not allowed to settle in areas west of the Appalachian Mountains&quot;, &quot;they were made to pay for the war&quot;, &quot;they didn't get any benefit from the victory of Britain&quot;], correct: 3 },
                    { q: &quot;What can we infer from the passage?&quot;, options: [&quot;Britain was not strong enough to control the New World in the 17th century.&quot;, &quot;France lost everything in North America after the war with Britain.&quot;, &quot;Indians must have been much stronger than Britain at that time.&quot;, &quot;Indians lived a relatively peaceful life.&quot;], correct: 1 }
                ]
            },
            {
                title: &quot;Amish History&quot;,
                text: &quot;Amish belong to a Protestant-based religious group that originated in Switzerland and Germany in 1500s. Martin Luther broke away from the Roman Catholic Church. Consequently, the Protestant Reformation, putting heavy emphasis on personal faith and the authority of the Bible, swept through northern Germany and Scandinavia.&lt;br&gt;&lt;br&gt;Not satisfied with conservative reform, many sects developed other forms of worship. One point of contention for the reform movement was baptism which, it was believed, should only be performed on adults who consciously accepted the teachings of Jesus Christ. Adult baptisms became identified with the so-called Radical Reformation movement. Its reformers were called Anabaptists, meaning \&quot;Rebaptizers\&quot; because they had already been baptized in the Catholic church as infants. They also believed in separation of church and state.&lt;br&gt;&lt;br&gt;These Swiss Anabaptists became known as Mennonites, after a Roman Catholic priest, Menno Simons, who led them in the Netherlands and Northern Germany in the 1530s. The Mennonites, regarded as heretics, were persecuted with torture, burning at the stake, jailing, drowning and general harassment during the 1600s. At the same time, a sect of stricter Mennonites, who followed Jacob Ammann, broke off from the group and became known as Amish.&quot;,
                questions: [
                    { q: &quot;What is the passage mainly about?&quot;, options: [&quot;Religions that ruled the countries in 1500s&quot;, &quot;The dominant religion reformed by Mennonites&quot;, &quot;A religion which came from Roman Catholicism&quot;, &quot;The history of Rebaptizers&quot;], correct: 2 },
                    { q: &quot;What does the Protestant Reformation value a lot?&quot;, options: [&quot;Adult baptism&quot;, &quot;Individual belief and the importance of the Bible&quot;, &quot;Conservative reformation and authority of the religion&quot;, &quot;Torture, burning at the stake, jailing, drowning and general harassment&quot;], correct: 1 },
                    { q: &quot;What did the Protestant Reformation accomplish?&quot;, options: [&quot;It was thought to be the best movement in Europe.&quot;, &quot;It attracted religious people all around the world.&quot;, &quot;It made the Bible easier to understand.&quot;, &quot;It was popular with some people in Germany and Scandinavia.&quot;], correct: 3 },
                    { q: &quot;In the second paragraph, the word \&quot;contention\&quot; is closest in meaning to&quot;, options: [&quot;discussion&quot;, &quot;relationship&quot;, &quot;disputation&quot;, &quot;importance&quot;], correct: 2 },
                    { q: &quot;In the second paragraph, the word \&quot;they\&quot; refers to&quot;, options: [&quot;reformers&quot;, &quot;baptisms&quot;, &quot;adults&quot;, &quot;teachers&quot;], correct: 0 },
                    { q: &quot;According to the passage, why were the reformers of the Radical Reformation movement called Anabaptists?&quot;, options: [&quot;They willingly accepted the guide of Jesus.&quot;, &quot;They thought religion should go with governments.&quot;, &quot;They believed baptism should only be performed on adults.&quot;, &quot;They had been baptized when they were very young.&quot;], correct: 3 },
                    { q: &quot;What is NOT mentioned in the passage about Mennonites?&quot;, options: [&quot;They were once led by Menno Simons.&quot;, &quot;They were considered evil.&quot;, &quot;They all strictly observed the doctrines.&quot;, &quot;They were brutally tortured.&quot;], correct: 2 },
                    { q: &quot;According to the author, who became Amish at the end of the passage?&quot;, options: [&quot;Only part of Mennonites&quot;, &quot;Anabaptists&quot;, &quot;Jacob Ammann&quot;, &quot;A group of Amish&quot;], correct: 0 }
                ]
            },
            {
                title: &quot;The Nile River&quot;,
                text: &quot;Without the Nile River, the great civilization of Ancient Egypt may never have existed. Until about nine thousand years ago, all of Egypt was under water. When the climate began to turn dry, tribes of people moved from North Africa to land near the river. Small villages appeared along the banks of the Nile. Each village had a chief who would battle other villages. Around 3300 B.C.E., these tribes came together to form the civilization of Ancient Egypt.&lt;br&gt;&lt;br&gt;One reason Ancient Egypt was built around the Nile River was because its yearly flood made farming possible. The flood was so important that religious leaders would perform ceremonies that were believed to cause the river to rise and flood. The flood made the land very good for growing grains such as wheat and barley. Farmers began to plant these crops in November, right after the flood. Because of the Nile, they were usually able to grow a lot of crops. If the grain was not used, it would be stored for later use. Historians believe this is one reason that Ancient Egypt became a powerful and wealthy nation.&lt;br&gt;&lt;br&gt;The Nile also served as an important means of transportation. Ancient Egypt did not have the wheel, so there were no wagons or carts back then. However, Ancient Egyptians learned to build boats so that when the Nile flooded they could use the river as a main road throughout Egypt. It is said that without the Nile, there would be no pyramids. This is because historians think that the huge stones were carried on the river by boat. This would explain why the pyramids sit close to the river on its west bank.&quot;,
                questions: [
                    { q: &quot;According to the passage, what is most important to Ancient Egyptian civilization?&quot;, options: [&quot;Pyramids&quot;, &quot;The religious leaders&quot;, &quot;The Nile River&quot;, &quot;Boats&quot;], correct: 2 },
                    { q: &quot;What is the passage mainly about?&quot;, options: [&quot;Ancient Egyptian civilization&quot;, &quot;The formation of Ancient Egyptian&quot;, &quot;The importance of the Nile River in Ancient Egypt&quot;, &quot;The importance of farming in Ancient Egyptian civilization&quot;], correct: 2 },
                    { q: &quot;According to the passage, when did people begin to move to the Nile?&quot;, options: [&quot;Nine thousand years ago&quot;, &quot;After the weather became dry&quot;, &quot;When the river began to flood&quot;, &quot;After the first crops began to grow&quot;], correct: 1 },
                    { q: &quot;Which of the following facts is NOT mentioned?&quot;, options: [&quot;They were tribes led by chiefs.&quot;, &quot;They lived along the Nile River.&quot;, &quot;They moved from North Africa.&quot;, &quot;They first arrived on boats.&quot;], correct: 3 },
                    { q: &quot;Why does the author mention religious leaders?&quot;, options: [&quot;To explain why the Nile flooded every year&quot;, &quot;To stress the importance of the Nile's floods&quot;, &quot;To suggest that Ancient Egypt was a religious society&quot;, &quot;To note the role they played in Ancient Egyptian society&quot;], correct: 1 },
                    { q: &quot;According to the passage, how did the Nile's floods affect farming along the river?&quot;, options: [&quot;They made the land good for growing crops.&quot;, &quot;They caused the crops to grow earlier in the year.&quot;, &quot;They allowed farmers to plant crops every few years.&quot;, &quot;They drowned all the drops, except for wheat and barley.&quot;], correct: 0 },
                    { q: &quot;In the second paragraph, the word \&quot;they\&quot; refers to&quot;, options: [&quot;crops&quot;, &quot;farmers&quot;, &quot;historians&quot;, &quot;religious leaders&quot;], correct: 1 },
                    { q: &quot;In the second paragraph, the word \&quot;stored\&quot; is closest in meaning to&quot;, options: [&quot;planted&quot;, &quot;carried&quot;, &quot;burned&quot;, &quot;saved&quot;], correct: 3 },
                    { q: &quot;According to the passage, why were there no carts or wagons in Ancient Egypt?&quot;, options: [&quot;They could not carry large stones.&quot;, &quot;There were no horses to pull them.&quot;, &quot;Ancient Egyptians did not need them.&quot;, &quot;There were no wheels in Ancient Egypt.&quot;], correct: 3 },
                    { q: &quot;Why did Ancient Egyptians learn to build boats?&quot;, options: [&quot;There were no roads through Ancient Egypt.&quot;, &quot;They wanted to build their pyramids far away&quot;, &quot;Boats were easier to make than carts and wagons.&quot;, &quot;They needed boats to transport things on the river.&quot;], correct: 3 },
                    { q: &quot;What does the author imply about the pyramids sitting close to the Nile?&quot;, options: [&quot;The pyramids' stones were used to make Egypt's main roads.&quot;, &quot;Historians think it is proof that the stones were carried on the Nile.&quot;, &quot;The pyramids' stones were too big for carts and wagons to carry.&quot;, &quot;Historians think there were also pyramids far away from the Nile.&quot;], correct: 1 }
                ]
            }
        ];

        let studentName = &quot;&quot;;
        let currentPassageIdx = 0;
        let currentQuestionIdx = 0;
        let answers = Array(passages.length).fill(null).map((_, i) =&gt; Array(passages[i].questions.length).fill(null));
        let sdk = null;

        function startTest() {
            const nameInput = document.getElementById('student-name').value.trim();
            if (!nameInput) return alert(&quot;Please enter your name&quot;);
            studentName = nameInput;
            document.getElementById('display-name').innerText = studentName;
            document.getElementById('login-overlay').style.display = 'none';
            sdk = new MuskCollect();
            renderTabs();
            updateDisplay();
            startTimer();
        }

        function renderTabs() {
            const container = document.getElementById('passage-tabs');
            container.innerHTML = passages.map((p, idx) =&gt; `
                &lt;div class=&quot;tab ${idx === currentPassageIdx ? 'active' : ''}&quot; onclick=&quot;selectPassage(${idx})&quot;&gt;Text ${idx + 1}&lt;/div&gt;
            `).join('');
        }

        function selectPassage(idx) {
            currentPassageIdx = idx;
            currentQuestionIdx = 0;
            renderTabs();
            updateDisplay();
        }

        function updateDisplay() {
            const passage = passages[currentPassageIdx];
            document.getElementById('p-title').innerText = passage.title;
            document.getElementById('p-content').innerHTML = passage.text;
            renderQuestion();
            updateNav();
        }

        function renderQuestion() {
            const passage = passages[currentPassageIdx];
            const question = passage.questions[currentQuestionIdx];
            const userAns = answers[currentPassageIdx][currentQuestionIdx];

            let globalNum = 0;
            for (let i = 0; i &lt; currentPassageIdx; i++) globalNum += passages[i].questions.length;
            globalNum += (currentQuestionIdx + 1);

            document.getElementById('q-container').innerHTML = `
                &lt;div class=&quot;question-box active&quot;&gt;
                    &lt;div style=&quot;font-weight:bold; color:var(--primary); margin-bottom:10px;&quot;&gt;Question ${globalNum} / 42&lt;/div&gt;
                    &lt;div style=&quot;margin-bottom:15px; font-weight: 500;&quot;&gt;${question.q}&lt;/div&gt;
                    &lt;div class=&quot;options&quot;&gt;
                        ${question.options.map((opt, i) =&gt; {
                            let cls = &quot;option&quot;;
                            if (userAns !== null) {
                                if (i === question.correct) cls += &quot; correct&quot;;
                                else if (i === userAns) cls += &quot; wrong&quot;;
                            }
                            return `
                                &lt;div class=&quot;${cls}&quot; onclick=&quot;handleAnswer(${i})&quot;&gt;
                                    &lt;span class=&quot;opt-label&quot;&gt;${String.fromCharCode(65 + i)}&lt;/span&gt; ${opt}
                                &lt;/div&gt;
                            `;
                        }).join('')}
                    &lt;/div&gt;
                    &lt;div class=&quot;feedback ${userAns !== null ? 'show' : ''}&quot;&gt;
                        ${userAns === question.correct ? 
                            '&lt;span style=&quot;color:var(--success)&quot;&gt;✓ Correct!&lt;/span&gt;' : 
                            `&lt;span style=&quot;color:var(--error)&quot;&gt;✗ Incorrect. Correct answer is (${String.fromCharCode(65 + question.correct)}).&lt;/span&gt;`}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;
            document.getElementById('cur-num').innerText = globalNum;
        }

        function handleAnswer(idx) {
            if (answers[currentPassageIdx][currentQuestionIdx] !== null) return;
            answers[currentPassageIdx][currentQuestionIdx] = idx;
            renderQuestion();
            checkSubmit();
        }

        function updateNav() {
            const isFirst = currentPassageIdx === 0 &amp;&amp; currentQuestionIdx === 0;
            const isLast = currentPassageIdx === passages.length - 1 &amp;&amp; currentQuestionIdx === passages[currentPassageIdx].questions.length - 1;

            document.getElementById('prev-btn').disabled = isFirst;
            document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
            document.getElementById('submit-btn').style.display = isLast ? 'block' : 'none';
        }

        function goNext() {
            const data = passages[currentPassageIdx];
            if (currentQuestionIdx &lt; data.questions.length - 1) {
                currentQuestionIdx++;
            } else if (currentPassageIdx &lt; passages.length - 1) {
                currentPassageIdx++;
                currentQuestionIdx = 0;
                renderTabs();
            }
            updateDisplay();
        }

        function goPrev() {
            if (currentQuestionIdx &gt; 0) {
                currentQuestionIdx--;
            } else if (currentPassageIdx &gt; 0) {
                currentPassageIdx--;
                currentQuestionIdx = passages[currentPassageIdx].questions.length - 1;
                renderTabs();
            }
            updateDisplay();
        }

        function checkSubmit() {
            let total = 0;
            answers.forEach(arr =&gt; total += arr.filter(a =&gt; a !== null).length);
            if (total === 42) document.getElementById('submit-btn').disabled = false;
        }

        async function finishTest() {
            let correctCount = 0;
            answers.forEach((arr, pIdx) =&gt; {
                arr.forEach((ans, qIdx) =&gt; {
                    if (ans === passages[pIdx].questions[qIdx].correct) correctCount++;
                });
            });

            const code = 'RD-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            if (sdk) {
                await sdk.save('toefl_results', {
                    studentName, score: `${correctCount}/42`, correctCount, totalQuestions: 42, code
                });
            }

            document.getElementById('final-score').innerText = correctCount;
            document.getElementById('sub-code').innerText = code;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function copyCode() {
            const code = document.getElementById('sub-code').innerText;
            navigator.clipboard.writeText(code).then(() =&gt; alert(&quot;Code copied!&quot;));
        }

        function startTimer() {
            let time = 25 * 60;
            const timerEl = document.getElementById('timer');
            const itv = setInterval(() =&gt; {
                const m = Math.floor(time / 60);
                const s = time % 60;
                timerEl.innerText = `${m}:${s &lt; 10 ? '0' : ''}${s}`;
                if (time &gt; 0) time--; else { clearInterval(itv); finishTest(); }
            }, 1000);
        }
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**

     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
